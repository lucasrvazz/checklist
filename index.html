let userDisciplines=[],grades={},activeTab='home',currentUser=null,saveTimer=null,cdInterval=null,dragContext=null;
const genId=()=>Math.random().toString(36).substr(2,9);
auth.onAuthStateChanged(async user=>{
  if(user){currentUser=user;updateUserUI(user);await loadFromFirestore();showScreen('app');try{renderAll();}catch(e){console.error(e);}startCountdown();}
  else showScreen('login');
});
function signIn(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert('Erro: '+e.message));}
function doSignOut(){if(!confirm('Sair?'))return;auth.signOut();userDisciplines=[];grades={};showScreen('login');}
function updateUserUI(u){document.getElementById('user-name').textContent=(u.displayName||u.email||'U').split(' ')[0];document.getElementById('user-avatar').innerHTML=u.photoURL?`<img src="${u.photoURL}" alt="">`:((u.displayName||'U').charAt(0).toUpperCase());}
function showScreen(w){document.getElementById('loading-screen').style.display=w==='loading'?'flex':'none';document.getElementById('login-screen').style.display=w==='login'?'flex':'none';document.getElementById('app').style.display=w==='app'?'block':'none';}
async function loadFromFirestore(){
  try{
    const snap=await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data').get();
    if(snap.exists){
      const data=snap.data();
      if(data.userDisciplines)userDisciplines=migrateStates(data.userDisciplines);
      else if(data.checked)userDisciplines=migrateLegacyData(data.checked);
      else userDisciplines=buildInitialData();
      grades=data.grades||buildInitialGrades();
      // Ensure all template disciplines exist
      TEMPLATE_DISCIPLINES.forEach(td=>{
        if(!userDisciplines.find(d=>d.id===td.id)){
          const cl=JSON.parse(JSON.stringify(td));
          cl.sections.forEach(s=>{s.items=s.items.map(lbl=>({id:genId(),label:lbl,state:0}));});
          userDisciplines.push(cl);
        }
      });
      // Ensure all grade configs initialized
      Object.keys(GRADE_CONFIG).forEach(id=>{if(!grades[id]){grades[id]={};GRADE_CONFIG[id].components.forEach(c=>grades[id][c.id]=null);}});
    }else{userDisciplines=buildInitialData();grades=buildInitialGrades();}
  }catch(e){console.error(e);userDisciplines=buildInitialData();grades=buildInitialGrades();}
}
function buildInitialData(){return TEMPLATE_DISCIPLINES.map(d=>{let cl=JSON.parse(JSON.stringify(d));cl.sections.forEach(s=>{s.items=s.items.map(lbl=>({id:genId(),label:lbl,state:0}));});return cl;});}
function buildInitialGrades(){let g={};Object.keys(GRADE_CONFIG).forEach(id=>{g[id]={};GRADE_CONFIG[id].components.forEach(c=>{g[id][c.id]=null;});});return g;}
function migrateStates(discs){return discs.map(d=>{let cl=JSON.parse(JSON.stringify(d));cl.sections.forEach(s=>{s.items=s.items.map(item=>{if(typeof item.state==='undefined'){item.state=item.done?1:0;delete item.done;}if(!item.id)item.id=genId();return item;});});return cl;});}
function migrateLegacyData(old){return TEMPLATE_DISCIPLINES.map(d=>{let cl=JSON.parse(JSON.stringify(d));cl.sections.forEach((s,si)=>{s.items=s.items.map((lbl,ii)=>({id:genId(),label:lbl,state:old[`${d.id}.${si}.${ii}`]?1:0}));});return cl;});}
function scheduleSave(){setSyncStatus('saving');clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await db.collection('users').doc(currentUser.uid).collection('checklist').doc('data').set({userDisciplines,grades,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});setSyncStatus('saved');}catch(e){setSyncStatus('error');}},800);}
function setSyncStatus(s){const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-lbl');if(!dot)return;dot.className='sync-dot'+(s==='saving'?' saving':s==='error'?' error':'');lbl.textContent=s==='saving'?'salvando...':s==='error'?'erro ✕':'salvo ✓';}
function secStats(items){if(!items)return{done:0,total:0};return{done:items.filter(i=>i.state>=1).length,total:items.length};}
function discStats(d){let done=0,total=0;(d.sections||[]).forEach(s=>{const st=secStats(s.items);done+=st.done;total+=st.total;});return{done,total};}
function discRvStats(d){let s1=0,s2=0,s3=0,total=0;(d.sections||[]).forEach(s=>{if(!s.items)return;s.items.forEach(i=>{total++;if(i.state>=1)s1++;if(i.state>=2)s2++;if(i.state>=3)s3++;});});return{s1,s2,s3,total};}
function overallStats(){let done=0,total=0;userDisciplines.forEach(d=>{const st=discStats(d);done+=st.done;total+=st.total;});return{done,total,pct:total?Math.round(done/total*100):0};}
function examStats(exam){if(!exam.refs||!exam.refs.length)return null;let done=0,total=0;exam.refs.forEach(({d,s})=>{const disc=userDisciplines.find(x=>x.id===d);if(!disc||!disc.sections[s])return;const st=secStats(disc.sections[s].items);done+=st.done;total+=st.total;});return{done,total,pct:total?Math.round(done/total*100):0};}
function calcGrade(discId){const cfg=GRADE_CONFIG[discId];if(!cfg)return null;const g=grades[discId]||{};let cur=0,minG=0,maxG=0,anyEntered=false;cfg.components.forEach(c=>{const v=g[c.id];if(v!==null&&v!==undefined&&v!==''){const n=parseFloat(v);cur+=n*c.weight;minG+=n*c.weight;maxG+=n*c.weight;anyEntered=true;}else maxG+=10*c.weight;});return{cur:anyEntered?Math.round(cur*100)/100:null,min:Math.round(minG*100)/100,max:Math.round(maxG*100)/100,anyEntered};}
function startCountdown(){if(cdInterval)clearInterval(cdInterval);updateCd();cdInterval=setInterval(updateCd,1000);}
function updateCd(){const el=document.getElementById('countdown');if(!el)return;const diff=new Date('2026-07-18T23:59:59')-new Date();if(diff<=0){el.innerHTML='<span style="color:#34d399;font-weight:600">🎉 Semestre encerrado!</span>';clearInterval(cdInterval);return;}const days=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);el.innerHTML=`<div class="cd-unit"><div class="cd-num">${days}</div><div class="cd-lbl">dias</div></div><div class="cd-unit"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-lbl">h</div></div><div class="cd-unit"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-lbl">min</div></div><div class="cd-unit"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-lbl">seg</div></div>`;}
function renderTabs(){const all=[{id:'home',label:'Início',emoji:'🏠',cls:'home',dot:'#0f1f3d'},{id:'resumo',label:'Provas',emoji:'📅',cls:'resumo',dot:'#64748b'},...userDisciplines.map(d=>({id:d.id,label:d.label,emoji:d.emoji,cls:d.id,dot:d.color,stats:discStats(d)}))];document.getElementById('tabs').innerHTML=all.map(t=>{const active=t.id===activeTab?`t-${t.cls} active`:'';const cnt=t.stats?`<span class="tab-cnt">${t.stats.done}/${t.stats.total}</span>`:'';return`<div class="tab t-${t.cls} ${active}" onclick="switchTab('${t.id}')"><span class="tab-dot" style="background:${t.dot||'#94a3b8'}"></span>${t.emoji} ${t.label}${cnt}</div>`;}).join('');}
function renderHome(){
  const progCards=userDisciplines.map(d=>{const st=discStats(d);const rv=discRvStats(d);const pct=st.total?Math.round(st.done/st.total*100):0;const gc=calcGrade(d.id);const avgTxt=gc&&gc.anyEntered?`Média: <b style="color:${gc.cur>=5?'#16a34a':'#e11d48'}">${gc.cur.toFixed(1)}</b>`:'Sem notas';return`<div class="prog-card"><div class="prog-card-top"><div class="prog-disc-name">${d.emoji} <span style="color:${d.color}">${d.label}</span></div><div class="prog-pct" style="color:${d.color}">${pct}%</div></div><div class="prog-bar-bg"><div class="prog-bar-f" style="width:${pct}%;background:${d.fill}"></div></div><div class="prog-sub">${st.done}/${st.total} tópicos · ${avgTxt}</div><div class="prog-rv"><span>✅ ${rv.s1}</span><span>🔄 ${rv.s2}</span><span>⭐ ${rv.s3}</span></div></div>`;}).join('');
  const tableRows=userDisciplines.filter(d=>GRADE_CONFIG[d.id]).map(d=>{const cfg=GRADE_CONFIG[d.id];const gc=calcGrade(d.id);const avgClass=!gc||!gc.anyEntered?'pend':gc.cur>=5?'pass':'fail';const avgTxt=gc&&gc.anyEntered?gc.cur.toFixed(2):'–';const barPct=gc&&gc.anyEntered?Math.min(100,gc.cur/10*100):0;const maxPct=gc?Math.min(100,gc.max/10*100):100;return`<tr><td><div class="gt-disc" style="color:${cfg.color}">${d.emoji} ${d.label}</div></td><td><span class="gt-avg ${avgClass}">${avgTxt}</span></td><td><span class="gt-range">${gc?`${gc.min.toFixed(1)} – ${gc.max.toFixed(1)}`:'0,0 – 10,0'}</span></td><td><div class="gt-bar-wrap"><div class="gt-bar-bg"><div class="gt-bar-max" style="width:${maxPct}%;background:${cfg.color}"></div><div class="gt-bar-cur" style="width:${barPct}%;background:${cfg.color}"></div><div class="gt-pass-line"></div></div></div></td><td><button onclick="switchTab('${d.id}')" style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;font-size:.7rem;cursor:pointer;color:var(--slate)">Notas ✏️</button></td></tr>`;}).join('');
  const chartRows=userDisciplines.filter(d=>GRADE_CONFIG[d.id]).map(d=>{const cfg=GRADE_CONFIG[d.id];const gc=calcGrade(d.id);const curPct=gc&&gc.anyEntered?Math.min(100,gc.cur/10*100):0;const maxPct=gc?Math.min(100,gc.max/10*100):100;const curLbl=gc&&gc.anyEntered?gc.cur.toFixed(1):'';return`<div class="chart-row"><div class="chart-label" style="color:${cfg.color}">${d.emoji} ${d.label}</div><div class="chart-bars"><div class="chart-bg"></div><div class="chart-max-bar" style="width:${maxPct}%;background:${cfg.color}"></div><div class="chart-cur-bar" style="width:${curPct}%;background:${cfg.color}">${curLbl?`<span class="chart-cur-lbl">${curLbl}</span>`:''}</div><div class="chart-pass-line" style="left:50%"></div></div><div class="chart-val" style="color:${cfg.color}">${gc&&gc.anyEntered?gc.cur.toFixed(1):'–'}</div></div>`;}).join('');
  return`<div class="home-section"><div class="home-sec-title">⏱ Contagem Regressiva — Final do Semestre (18/07/2026)</div><div class="countdown-card"><div class="cd-left"><strong>18 de julho de 2026</strong><span>Fim do semestre letivo · MED 117</span></div><div class="cd-units" id="countdown"></div></div></div>
  <div class="home-section"><div class="home-sec-title">📊 Progresso por Disciplina</div><div class="progress-grid">${progCards}</div></div>
  <div class="home-section"><div class="home-sec-title">📝 Notas do Semestre</div><div class="grades-table-wrap"><table class="grades-table"><thead><tr><th>Disciplina</th><th>Média</th><th>Mín – Máx possível</th><th>Barra</th><th></th></tr></thead><tbody>${tableRows}</tbody></table></div></div>
  <div class="home-section"><div class="home-sec-title">📈 Gráfico de Notas (linha vermelha = 5,0)</div><div class="chart-wrap"><div class="chart-legend"><div class="cl-item"><div class="cl-swatch" style="background:#94a3b8;opacity:.5"></div>Máximo possível</div><div class="cl-item"><div class="cl-swatch" style="background:#0f1f3d"></div>Média atual</div></div>${chartRows}</div></div>`;
}
function renderResumo(){let prevMonth='';const rows=EXAM_MAP.map(exam=>{const stats=examStats(exam);const color=COLORS[exam.cls]||'#94a3b8';const fill=FILLS[exam.cls]||'#cbd5e1';let sep='';if(exam.month!==prevMonth){sep=`<div class="month-sep">— ${exam.month}</div>`;prevMonth=exam.month;}const progress=!stats?`<span class="na-tag">${exam.note||'–'}</span>`:`<div class="exam-bar-wrap"><div class="exam-bar-bg"><div class="exam-bar-f" style="width:${stats.pct}%;background:${fill}"></div></div><div class="exam-bar-labels"><span class="exam-pct" style="color:${color}">${stats.pct}%</span><span class="exam-cnt">${stats.done}/${stats.total}</span></div></div>`;const acc=exam.accumulated?'<span class="acc-tag">acumulativo</span>':'';return`${sep}<div class="exam-row"><div class="exam-stripe" style="background:${color}"></div><div class="exam-body"><div class="exam-date">${exam.date}</div><div class="exam-name">${exam.full} ${acc}</div>${progress}</div></div>`;}).join('');return`<div class="resumo-intro">ℹ️ % dos tópicos estudados por avaliação. Provas <b>acumulativas</b> somam conteúdos anteriores.</div>${rows}`;}
function renderGradeBox(d){const cfg=GRADE_CONFIG[d.id];if(!cfg)return'';const g=grades[d.id]||{};const gc=calcGrade(d.id);const avgClass=!gc||!gc.anyEntered?'pend':gc.cur>=5?'pass':'fail';const rows=cfg.components.map(c=>{const v=g[c.id];const filled=v!==null&&v!==''&&v!==undefined;const contrib=filled?`<span style="color:${d.color};font-weight:600">${(parseFloat(v)*c.weight).toFixed(2)}</span>`:'';return`<div class="grade-row"><div class="grade-lbl">${c.label}<small>${c.date} · peso ${Math.round(c.weight*100)}%</small></div><div class="grade-weight">${Math.round(c.weight*100)}%</div><input class="grade-input ${filled?'filled':''}" type="number" min="0" max="10" step="0.1" placeholder="–" value="${filled?parseFloat(v).toFixed(1):''}" onchange="updateGrade('${d.id}','${c.id}',this.value)"><div class="grade-contribution">${contrib}</div></div>`;}).join('');return`<div class="grade-box" id="grade-box-${d.id}"><div class="grade-box-title"><span>📝 Notas — ${d.label}</span><span class="grade-final ${avgClass}">${gc&&gc.anyEntered?`${gc.cur.toFixed(2)} / 10.0`:'– / 10'}</span></div>${rows}<div style="font-size:.7rem;color:var(--slate);margin-top:10px;text-align:right;font-family:'DM Mono',monospace">Mín possível: <b>${gc?gc.min.toFixed(2):'0,00'}</b> &nbsp;|&nbsp; Máx possível: <b>${gc?gc.max.toFixed(2):'10,00'}</b></div></div>`;}
function renderDiscPanel(d){const{done,total}=discStats(d);return`<div class="disc-header"><div class="disc-title" style="color:${d.color}">${d.emoji}<span class="editable-title" contenteditable="true" onblur="updateTitle('${d.id}',null,this.innerText)">${d.fullLabel}</span></div><div class="disc-stats">${done}/${total} tópicos</div></div>${d.note?`<div class="note">ℹ️ ${d.note}</div>`:''}${renderGradeBox(d)}${(d.sections||[]).map((s,si)=>renderSection(d,s,si)).join('')}<button class="reset-btn" onclick="resetDisc('${d.id}')">🗑 Limpar todos os checks de ${d.label}</button>`;}
function renderSection(d,s,si){const{done,total}=secStats(s.items);const pct=total?Math.round(done/total*100):0;return`<div class="section" id="sec-${d.id}-${si}"><div class="sec-head"><div class="sec-title"><span class="editable-title" contenteditable="true" onblur="updateTitle('${d.id}',${si},this.innerText)">${s.title}</span><span class="exam-tag ${s.tagClass||''}">📅 ${s.exam||'N/A'}</span></div><div class="sec-count">${done}/${total}</div></div><div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${d.fill}"></div></div><div class="checklist" ondragover="dragOver(event)" ondrop="drop(event,'${d.id}',${si})">${(s.items||[]).map(item=>renderItem(d,si,item)).join('')}</div><button class="add-btn" onclick="addItem('${d.id}',${si})">+ Adicionar tópico</button></div>`;}
function renderItem(d,si,item){const st=item.state||0;return`<div class="item ${st>=1?`s${Math.min(st,3)}`:''}" data-id="${item.id}" draggable="true" ondragstart="dragStart(event,'${d.id}',${si},'${item.id}')"><span class="rv rv-${st}" onclick="cycleState('${d.id}',${si},'${item.id}');event.stopPropagation()">${RV[st]}</span><div class="itext">${item.label}</div><div class="item-actions"><button class="del-btn" onclick="deleteItem(event,'${d.id}',${si},'${item.id}')">🗑</button></div></div>`;}
function renderAll(){renderTabs();document.getElementById('panels').innerHTML=`<div class="panel ${activeTab==='home'?'active':''}" id="panel-home">${renderHome()}</div><div class="panel ${activeTab==='resumo'?'active':''}" id="panel-resumo">${renderResumo()}</div>`+userDisciplines.map(d=>`<div class="panel ${activeTab===d.id?'active':''}" id="panel-${d.id}">${renderDiscPanel(d)}</div>`).join('');updateOverall();startCountdown();}
function updateOverall(){const{done,total,pct}=overallStats();if(document.getElementById('overall-fill'))document.getElementById('overall-fill').style.width=pct+'%';if(document.getElementById('hdr-pct'))document.getElementById('hdr-pct').textContent=pct+'%';if(document.getElementById('hdr-of'))document.getElementById('hdr-of').textContent=`${done}/${total} tópicos`;}
function switchTab(id){activeTab=id;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));const panel=document.getElementById('panel-'+id);if(panel){if(id==='home')panel.innerHTML=renderHome();else if(id==='resumo')panel.innerHTML=renderResumo();panel.classList.add('active');}renderTabs();if(id==='home')startCountdown();}
function cycleState(dId,si,itemId){const d=userDisciplines.find(x=>x.id===dId);const item=d.sections[si].items.find(i=>i.id===itemId);if(!item)return;item.state=(item.state||0)===3?0:(item.state||0)+1;scheduleSave();const el=document.getElementById(`sec-${dId}-${si}`);if(el)el.outerHTML=renderSection(d,d.sections[si],si);const dh=document.querySelector(`#panel-${dId} .disc-stats`);if(dh){const st=discStats(d);dh.textContent=`${st.done}/${st.total} tópicos`;}updateOverall();renderTabs();if(activeTab==='home'){const hp=document.getElementById('panel-home');if(hp)hp.innerHTML=renderHome();startCountdown();}}
function updateGrade(dId,cId,val){if(!grades[dId])grades[dId]={};const n=parseFloat(val);grades[dId][cId]=(val===''||isNaN(n))?null:Math.min(10,Math.max(0,Math.round(n*10)/10));scheduleSave();const box=document.getElementById(`grade-box-${dId}`);const d=userDisciplines.find(x=>x.id===dId);if(box&&d)box.outerHTML=renderGradeBox(d);if(activeTab==='home'){const hp=document.getElementById('panel-home');if(hp)hp.innerHTML=renderHome();startCountdown();}}
function updateTitle(dId,si,newTitle){const text=newTitle.trim();if(!text)return;const d=userDisciplines.find(x=>x.id===dId);if(si===null)d.fullLabel=text;else d.sections[si].title=text;scheduleSave();}
function addItem(dId,si){const text=prompt('Nome do novo tópico:');if(!text||!text.trim())return;const d=userDisciplines.find(x=>x.id===dId);d.sections[si].items.push({id:genId(),label:text.trim(),state:0});scheduleSave();renderAll();}
function deleteItem(event,dId,si,itemId){event.stopPropagation();if(!confirm('Excluir este tópico?'))return;const d=userDisciplines.find(x=>x.id===dId);d.sections[si].items=d.sections[si].items.filter(i=>i.id!==itemId);scheduleSave();renderAll();}
function resetDisc(dId){if(!confirm(`Apagar todos os checks de ${dId}?`))return;const d=userDisciplines.find(x=>x.id===dId);d.sections.forEach(s=>s.items.forEach(i=>i.state=0));scheduleSave();document.getElementById('panel-'+dId).innerHTML=renderDiscPanel(d);updateOverall();renderTabs();}
function dragStart(e,dId,si,itemId){dragContext={dId,si,itemId};e.dataTransfer.setData('text/plain',itemId);setTimeout(()=>e.target.classList.add('dragging'),0);}
function dragOver(e){e.preventDefault();}
function drop(e,targetDId,targetSi){e.preventDefault();if(!dragContext)return;if(dragContext.dId!==targetDId){alert('Só é possível arrastar dentro da mesma matéria.');return;}const d=userDisciplines.find(x=>x.id===targetDId);const src=d.sections[dragContext.si],tgt=d.sections[targetSi];const idx=src.items.findIndex(i=>i.id===dragContext.itemId);if(idx===-1)return;const[moved]=src.items.splice(idx,1);const dropEl=e.target.closest('.item');if(dropEl){const ti=tgt.items.findIndex(i=>i.id===dropEl.dataset.id);tgt.items.splice(ti>=0?ti:tgt.items.length,0,moved);}else tgt.items.push(moved);dragContext=null;scheduleSave();renderAll();}
</script>
</body>
