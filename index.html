<title>Checklist – MED 117 2026.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy-mid:#1a3260;--navy-light:#244080;
  --teal:#0d9488;--teal-l:#14b8a6;
  --sky:#0284c7;--sky-l:#38bdf8;
  --violet:#7c3aed;--violet-l:#a78bfa;
  --rose:#e11d48;--rose-l:#fb7185;
  --slate:#64748b;--slate-l:#94a3b8;
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;--text:#1e293b;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);color:#fff;padding:20px 26px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-title{font-size:1.15rem;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:.75rem;opacity:.6;margin-top:2px;font-family:'DM Mono',monospace}
.overall{display:flex;align-items:center;gap:10px;margin-top:12px}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-l),#34d399);border-radius:10px;transition:width .5s ease}
.hdr-num{text-align:right}
.hdr-pct{font-size:1.5rem;font-weight:700;line-height:1}
.hdr-of{font-size:.72rem;opacity:.6;margin-top:2px;font-family:'DM Mono',monospace}

.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 18px;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--slate);white-space:nowrap;transition:all .2s;margin-bottom:-2px;display:flex;align-items:center;gap:6px;user-select:none}
.tab:hover{color:var(--text)}
.tab.t-resumo.active{color:var(--navy);border-color:var(--navy)}
.tab.t-ced.active{color:var(--teal);border-color:var(--teal)}
.tab.t-neo.active{color:var(--sky);border-color:var(--sky)}
.tab.t-go.active{color:var(--violet);border-color:var(--violet)}
.tab.t-pato.active{color:var(--rose);border-color:var(--rose)}
.tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tab-cnt{font-size:.68rem;font-family:'DM Mono',monospace;opacity:.6}

.panels{padding:20px 24px 60px;max-width:860px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

.resumo-intro{font-size:.8rem;color:var(--slate);margin-bottom:18px;background:var(--surface);border-radius:10px;padding:10px 14px;border:1px solid var(--border)}
.exam-row{background:var(--surface);border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.06),0 0 0 1px var(--border);margin-bottom:10px;display:flex;align-items:stretch;overflow:hidden;transition:box-shadow .15s}
.exam-row:hover{box-shadow:0 3px 12px rgba(0,0,0,.1),0 0 0 1px var(--border)}
.exam-stripe{width:5px;flex-shrink:0}
.exam-body{flex:1;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.exam-date{font-size:.72rem;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;min-width:68px;color:var(--slate)}
.exam-name{flex:1;font-size:.85rem;font-weight:600;min-width:160px}
.exam-bar-wrap{width:160px;display:flex;flex-direction:column;gap:4px}
.exam-bar-bg{height:6px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.exam-bar-f{height:100%;border-radius:4px;transition:width .4s ease}
.exam-bar-labels{display:flex;justify-content:space-between}
.exam-pct{font-size:.72rem;font-weight:700;font-family:'DM Mono',monospace}
.exam-cnt{font-size:.68rem;color:var(--slate);font-family:'DM Mono',monospace}
.acc-tag{font-size:.63rem;background:#f1f5f9;color:var(--slate);border:1px solid var(--border);padding:1px 6px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.na-tag{font-size:.72rem;color:var(--slate-l);font-style:italic}
.month-sep{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--slate-l);margin:18px 0 8px;padding-left:4px}

.disc-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.disc-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.disc-stats{font-size:.8rem;color:var(--slate);font-family:'DM Mono',monospace}
.section{margin-bottom:22px}
.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:10px}
.sec-title{font-size:.83rem;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap;line-height:1.3}
.exam-tag{font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:6px;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
.sec-count{font-size:.75rem;color:var(--slate);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}
.mini-track{height:3px;background:var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden}
.mini-fill{height:100%;border-radius:4px;transition:width .4s ease}
.tag-red{background:#fee2e2;color:#b91c1c}
.tag-amber{background:#fef3c7;color:#92400e}
.tag-purple{background:#ede9fe;color:#5b21b6}
.tag-green{background:#dcfce7;color:#166534}

.checklist{background:var(--surface);border-radius:12px;box-shadow:0 1px 5px rgba(0,0,0,.06),0 0 0 1px var(--border);overflow:hidden}
.item{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent;user-select:none}
.item:last-child{border-bottom:none}
.item:hover{background:#f8fafc}
.item.done{background:#f0fdf4}
.item.done .itext{color:#86efac;text-decoration:line-through;text-decoration-color:#4ade80}
.cb{width:20px;height:20px;border:2px solid #cbd5e1;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s ease;margin-top:1px;background:#fff}
.item.done .cb{background:#22c55e;border-color:#22c55e}
.cbchk{opacity:0;transition:opacity .15s}
.item.done .cbchk{opacity:1}
.itext{font-size:.85rem;line-height:1.45;color:var(--text);flex:1}

.note{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:10px 14px;font-size:.78rem;color:#78350f;margin-bottom:16px;display:flex;gap:7px}
.reset-btn{display:block;margin:0 auto 8px;padding:7px 16px;background:none;border:1px solid var(--border);border-radius:8px;font-size:.76rem;color:var(--slate);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.reset-btn:hover{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}

@media(max-width:600px){
  .hdr{padding:16px 14px 12px}.panels{padding:14px 12px 60px}
  .exam-bar-wrap{width:110px}.tabs{padding:0 8px}
  .exam-body{gap:8px}
}
</style>

];

const COLORS = { ced:'#0d9488', neo:'#0284c7', go:'#7c3aed', pato:'#e11d48', sfc:'#94a3b8' };
const FILLS  = { ced:'#14b8a6', neo:'#38bdf8', go:'#a78bfa', pato:'#fb7185', sfc:'#cbd5e1' };

// ── STATE via localStorage ──
let checked = {};
let activeTab = 'resumo';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) checked = JSON.parse(raw);
  } catch(e) { checked = {}; }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch(e) {}
}

// ── HELPERS ──
const key = (d,s,i) => `${d}.${s}.${i}`;

function secStats(dId, si, items) {
  let done = 0;
  items.forEach((_,i) => { if(checked[key(dId,si,i)]) done++; });
  return { done, total: items.length };
}

function examStats(exam) {
  if(!exam.refs.length) return null;
  let done = 0, total = 0;
  exam.refs.forEach(({d,s}) => {
    const disc = DISCIPLINES.find(x=>x.id===d);
    if(!disc?.sections[s]) return;
    const st = secStats(d, s, disc.sections[s].items);
    done += st.done; total += st.total;
  });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

function overallStats() {
  let done = 0, total = 0;
  DISCIPLINES.forEach(d => d.sections.forEach((s,si) => {
    const st = secStats(d.id, si, s.items);
    done += st.done; total += st.total;
  }));
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

function discStats(d) {
  let done = 0, total = 0;
  d.sections.forEach((s,si) => { const st = secStats(d.id,si,s.items); done+=st.done; total+=st.total; });
  return { done, total };
}

// ── RENDER TABS ──
function renderTabs() {
  const tabs = [
    { id:'resumo', label:'Resumo', emoji:'📊', cls:'resumo', dot:'#0f1f3d' },
    ...DISCIPLINES.map(d => ({ id:d.id, label:d.label, emoji:d.emoji, cls:d.id, dot:d.color, stats:discStats(d) }))
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t => {
    const active = t.id === activeTab ? `t-${t.cls} active` : '';
    const cnt = t.stats ? `<span class="tab-cnt">${t.stats.done}/${t.stats.total}</span>` : '';
    return `<div class="tab t-${t.cls} ${active}" onclick="switchTab('${t.id}')">
      <span class="tab-dot" style="background:${t.dot}"></span>
      ${t.emoji} ${t.label} ${cnt}
    </div>`;
  }).join('');
}

// ── RENDER RESUMO ──
function renderResumo() {
  let prevMonth = '';
  const rows = EXAM_MAP.map(exam => {
    const stats = examStats(exam);
    const color = COLORS[exam.cls] || '#94a3b8';
    const fill  = FILLS[exam.cls]  || '#cbd5e1';

    let monthSep = '';
    if(exam.month !== prevMonth) {
      monthSep = `<div class="month-sep">— ${exam.month}</div>`;
      prevMonth = exam.month;
    }

    let progressHtml;
    if(!stats) {
      progressHtml = `<span class="na-tag">${exam.note || '–'}</span>`;
    } else {
      progressHtml = `
        <div class="exam-bar-wrap">
          <div class="exam-bar-bg"><div class="exam-bar-f" style="width:${stats.pct}%;background:${fill}"></div></div>
          <div class="exam-bar-labels">
            <span class="exam-pct" style="color:${color}">${stats.pct}%</span>
            <span class="exam-cnt">${stats.done}/${stats.total} tópicos</span>
          </div>
        </div>`;
    }

    const accTag = exam.accumulated ? '<span class="acc-tag">acumulativo</span>' : '';

    return `${monthSep}
      <div class="exam-row">
        <div class="exam-stripe" style="background:${color}"></div>
        <div class="exam-body">
          <div class="exam-date">${exam.date}</div>
          <div class="exam-name">${exam.full} ${accTag}</div>
          ${progressHtml}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="resumo-intro">
      ℹ️ Cada barra mostra quantos % dos tópicos daquela avaliação você já estudou.
      Provas <b>acumulativas</b> somam também os conteúdos das provas anteriores.
    </div>
    ${rows}`;
}

// ── RENDER DISCIPLINE ──
function renderDiscPanel(d) {
  const { done, total } = discStats(d);
  return `
    <div class="disc-header">
      <div class="disc-title" style="color:${d.color}">${d.emoji} ${d.fullLabel}</div>
      <div class="disc-stats">${done}/${total} tópicos</div>
    </div>
    ${d.note ? `<div class="note">ℹ️ ${d.note}</div>` : ''}
    ${d.sections.map((s,si) => renderSection(d,s,si)).join('')}
    <button class="reset-btn" onclick="resetDisc('${d.id}')">🗑 Limpar todos os checks de ${d.label}</button>`;
}

function renderSection(d, s, si) {
  const { done, total } = secStats(d.id, si, s.items);
  const pct = total ? Math.round(done/total*100) : 0;
  return `
    <div class="section" id="sec-${d.id}-${si}">
      <div class="sec-head">
        <div class="sec-title">
          ${s.title}
          <span class="exam-tag ${s.tagClass}">📅 ${s.exam}</span>
        </div>
        <div class="sec-count">${done}/${total}</div>
      </div>
      <div class="mini-track"><div class="mini-fill" style="width:${pct}%;background:${d.fill}"></div></div>
      <div class="checklist">
        ${s.items.map((item,ii) => renderItem(d,si,ii,item)).join('')}
      </div>
    </div>`;
}

function renderItem(d, si, ii, label) {
  const k = key(d.id, si, ii);
  const done = !!checked[k];
  return `
    <div class="item ${done?'done':''}" onclick="toggle('${d.id}',${si},${ii})">
      <div class="cb"><svg class="cbchk" width="11" height="9" viewBox="0 0 11 9" fill="none">
        <path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg></div>
      <div class="itext">${label}</div>
    </div>`;
}

// ── RENDER ALL PANELS ──
function renderPanels() {
  const resumo = `<div class="panel ${activeTab==='resumo'?'active':''}" id="panel-resumo">${renderResumo()}</div>`;
  const discs = DISCIPLINES.map(d =>
    `<div class="panel ${activeTab===d.id?'active':''}" id="panel-${d.id}">${renderDiscPanel(d)}</div>`
  ).join('');
  document.getElementById('panels').innerHTML = resumo + discs;
}

function updateOverall() {
  const { done, total, pct } = overallStats();
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('hdr-of').textContent = `${done} / ${total} tópicos`;
}

// ── INTERACTIONS ──
function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-'+id);
  if(panel) {
    if(id === 'resumo') panel.innerHTML = renderResumo();
    panel.classList.add('active');
  }
  renderTabs();
}

function toggle(dId, si, ii) {
  const k = key(dId, si, ii);
  checked[k] = !checked[k];
  save();
  const d = DISCIPLINES.find(x=>x.id===dId);
  const el = document.getElementById(`sec-${dId}-${si}`);
  if(el) el.outerHTML = renderSection(d, d.sections[si], si);
  const dh = document.querySelector(`#panel-${dId} .disc-stats`);
  if(dh) { const st = discStats(d); dh.textContent = `${st.done}/${st.total} tópicos`; }
  updateOverall();
  renderTabs();
  if(activeTab === 'resumo') {
    const rp = document.getElementById('panel-resumo');
    if(rp) rp.innerHTML = renderResumo();
  }
}

function resetDisc(dId) {
  if(!confirm(`Apagar todos os checks de ${dId}?`)) return;
  Object.keys(checked).forEach(k => { if(k.startsWith(dId+'.')) delete checked[k]; });
  save();
  const d = DISCIPLINES.find(x=>x.id===dId);
  document.getElementById('panel-'+dId).innerHTML = renderDiscPanel(d);
  updateOverall();
  renderTabs();
  if(activeTab==='resumo') { const rp=document.getElementById('panel-resumo'); if(rp) rp.innerHTML=renderResumo(); }
}

// ── INIT ──
load();
renderTabs();
renderPanels();
updateOverall();
</script>
</body>
</html>
